server:
  port: ${SERVER_PORT:8086}

spring:
  application:
    name: notification-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/notification_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
  flyway:
    enabled: false
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
            required: ${MAIL_SMTP_STARTTLS_REQUIRED:false}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8090/realms/cnstn-intranet}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  internal:
    api-key: ${NOTIFICATION_INTERNAL_API_KEY:change-me}
  auth-user-service:
    base-url: ${AUTH_USER_SERVICE_URL:http://localhost:8081}
  mail:
    enabled: ${MAIL_ENABLED:true}
    from: ${MAIL_FROM:no-reply@cnstn.local}
    # Seuil minimum de priorite pour declencher l'envoi d'un email.
    # Une notification avec une priorite inferieure ne declenche PAS d'email
    # (elle reste disponible en in-app via SSE).
    # Valeurs: LOW | NORMAL | HIGH | CRITICAL
    min-priority: ${MAIL_MIN_PRIORITY:HIGH}
