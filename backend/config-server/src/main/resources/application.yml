server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_REPO_URI:file:///config-repo}
          clone-on-start: true
          default-label: main
          try-master-branch: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,env
