server:
  port: 8080

spring:
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Vary
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:4200
              - http://127.0.0.1:4200
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: '*'
            allowCredentials: true
      routes:
        - id: auth-user-service
          uri: lb://auth-user-service
          predicates:
            - Path=/api/v1/admin/**,/api/v1/me/**,/api/v1/auth/**,/api/v1/password/**,/api/v1/public/**,/api/v1/it-equipment/**
        - id: event-service
          uri: lb://event-service
          predicates:
            - Path=/api/v1/events/**
        - id: reservation-service
          uri: lb://reservation-service
          predicates:
            - Path=/api/v1/reservations/**,/api/v1/rooms/**,/api/v1/equipments/**
        - id: intervention-service
          uri: lb://intervention-service
          predicates:
            - Path=/api/v1/interventions/**
        - id: ged-service
          uri: lb://ged-service
          predicates:
            - Path=/api/v1/documents/**,/api/v1/workflows/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**
