# yaml-language-server: $schema=https://json.schemastore.org/spring-boot
server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: auth-user-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/auth_user_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      "[hibernate.format_sql]": true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8090/realms/cnstn-intranet}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

app:
  keycloak:
    server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8090}
    realm: ${KEYCLOAK_REALM:cnstn-intranet}
    admin-realm: ${KEYCLOAK_ADMIN_REALM:cnstn-intranet}
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:cnstn-admin-cli}
    client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:change-me}
    login-client-id: ${KEYCLOAK_LOGIN_CLIENT_ID:cnstn-postman}
    login-client-secret: ${KEYCLOAK_LOGIN_CLIENT_SECRET:}
  notification:
    base-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8086}
    internal-api-key: ${NOTIFICATION_INTERNAL_API_KEY:change-me}
  password-reset:
    frontend-url: ${PASSWORD_RESET_FRONTEND_URL:http://localhost:4200/reset-password}
    token-ttl-minutes: ${PASSWORD_RESET_TOKEN_TTL_MINUTES:30}

resilience4j:
  circuitbreaker:
    instances:
      keycloakAdmin:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 1m
