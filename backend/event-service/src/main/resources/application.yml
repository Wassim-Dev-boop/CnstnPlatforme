server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: event-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/event_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8090/realms/cnstn-intranet}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  internal:
    api-key: ${EVENT_INTERNAL_API_KEY:${NOTIFICATION_INTERNAL_API_KEY:change-me}}
  reservation:
    base-url: ${RESERVATION_SERVICE_URL:http://reservation-service:8084}
    internal-api-key: ${RESERVATION_INTERNAL_API_KEY:${NOTIFICATION_INTERNAL_API_KEY:change-me}}
  notification:
    base-url: ${NOTIFICATION_SERVICE_URL:http://notification-service:8086}
    internal-api-key: ${NOTIFICATION_INTERNAL_API_KEY:change-me}
  auth-user:
    base-url: ${AUTH_USER_SERVICE_URL:http://auth-user-service:8081}
    internal-api-key: ${AUTH_USER_INTERNAL_API_KEY:${NOTIFICATION_INTERNAL_API_KEY:change-me}}
  events:
    invitations:
      frontend-invitations-url: ${EVENT_INVITATIONS_FRONTEND_URL:http://localhost:4200/invitations}
