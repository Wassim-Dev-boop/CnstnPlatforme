services:
  postgres:
    image: postgres:16
    container_name: cnstn-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: cnstn-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cnstn-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@cnstn.tn}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-Admin@123}
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./infra/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: cnstn-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: keycloak_db
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_HOSTNAME_STRICT: "false"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8090:8080"
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      postgres:
        condition: service_healthy

  config-server:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: config-server
    container_name: cnstn-config-server
    environment:
      CONFIG_REPO_URI: file:///config-repo
      SPRING_PROFILES_ACTIVE: native
      SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS: file:///config-repo
    volumes:
      - ./config-repo:/config-repo
    ports:
      - "8888:8888"
    depends_on:
      postgres:
        condition: service_healthy

  discovery-server:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: discovery-server
    container_name: cnstn-discovery-server
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
    ports:
      - "8761:8761"
    depends_on:
      - config-server

  auth-user-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: auth-user-service
    container_name: cnstn-auth-user-service
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://discovery-server:8761/eureka
      DB_URL: jdbc:postgresql://postgres:5432/auth_user_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/cnstn-intranet
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: cnstn-intranet
      KEYCLOAK_ADMIN_REALM: cnstn-intranet
      KEYCLOAK_ADMIN_CLIENT_ID: cnstn-admin-cli
      KEYCLOAK_ADMIN_CLIENT_SECRET: admin-cli-secret
      NOTIFICATION_SERVICE_URL: http://notification-service:8086
      NOTIFICATION_INTERNAL_API_KEY: cnstn-internal-api-key-change-me
      PASSWORD_RESET_FRONTEND_URL: http://localhost:4200/reset-password
      PASSWORD_RESET_TOKEN_TTL_MINUTES: 30
    ports:
      - "8081:8081"
    depends_on:
      - config-server
      - discovery-server
      - keycloak
      - postgres

  event-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: event-service
    container_name: cnstn-event-service
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://discovery-server:8761/eureka
      DB_URL: jdbc:postgresql://postgres:5432/event_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/cnstn-intranet
      NOTIFICATION_SERVICE_URL: http://notification-service:8086
      NOTIFICATION_INTERNAL_API_KEY: cnstn-internal-api-key-change-me
      AUTH_USER_SERVICE_URL: http://auth-user-service:8081
      AUTH_USER_INTERNAL_API_KEY: cnstn-internal-api-key-change-me
    ports:
      - "8083:8083"
    depends_on:
      - config-server
      - discovery-server
      - keycloak
      - postgres

  reservation-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: reservation-service
    container_name: cnstn-reservation-service
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://discovery-server:8761/eureka
      DB_URL: jdbc:postgresql://postgres:5432/reservation_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/cnstn-intranet
      NOTIFICATION_SERVICE_URL: http://notification-service:8086
      NOTIFICATION_INTERNAL_API_KEY: cnstn-internal-api-key-change-me
    ports:
      - "8084:8084"
    depends_on:
      - config-server
      - discovery-server
      - keycloak
      - postgres
      - notification-service

  intervention-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: intervention-service
    container_name: cnstn-intervention-service
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://discovery-server:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: intervention-service
      DB_URL: jdbc:postgresql://postgres:5432/intervention_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/cnstn-intranet
      NOTIFICATION_SERVICE_URL: http://notification-service:8086
      NOTIFICATION_INTERNAL_API_KEY: cnstn-internal-api-key-change-me
    ports:
      - "8085:8085"
    depends_on:
      - config-server
      - discovery-server
      - keycloak
      - postgres
      - notification-service

  ged-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: ged-service
    container_name: cnstn-ged-service
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://discovery-server:8761/eureka
      DB_URL: jdbc:postgresql://postgres:5432/ged_db
      DB_USERNAME: postgres
      NOTIFICATION_SERVICE_URL: http://notification-service:8086
      NOTIFICATION_INTERNAL_API_KEY: cnstn-internal-api-key-change-me
      AUTH_USER_SERVICE_URL: http://auth-user-service:8081
      AUTH_USER_INTERNAL_API_KEY: cnstn-internal-api-key-change-me
      DB_PASSWORD: postgres
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/cnstn-intranet
    ports:
      - "8082:8082"
    depends_on:
      - config-server
      - discovery-server
      - keycloak
      - postgres
      - notification-service

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: notification-service
    container_name: cnstn-notification-service
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://discovery-server:8761/eureka
      DB_URL: jdbc:postgresql://postgres:5432/notification_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/cnstn-intranet
      NOTIFICATION_INTERNAL_API_KEY: cnstn-internal-api-key-change-me
      AUTH_USER_SERVICE_URL: http://auth-user-service:8081
      MAIL_ENABLED: ${MAIL_ENABLED:-true}
      MAIL_HOST: ${MAIL_HOST:-mailhog}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-no-reply@cnstn.local}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-false}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-false}
      MAIL_SMTP_STARTTLS_REQUIRED: ${MAIL_SMTP_STARTTLS_REQUIRED:-false}
    ports:
      - "8086:8086"
    depends_on:
      - config-server
      - discovery-server
      - keycloak
      - postgres
      - mailhog

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: api-gateway
    container_name: cnstn-api-gateway
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://discovery-server:8761/eureka
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/cnstn-intranet
    ports:
      - "8080:8080"
    depends_on:
      - config-server
      - discovery-server
      - auth-user-service
      - keycloak

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: cnstn-frontend
    ports:
      - "4200:80"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  pgadmin_data:
